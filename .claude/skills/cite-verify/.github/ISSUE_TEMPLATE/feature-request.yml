name: Feature Request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For open-ended ideas or discussion, consider posting in [Discussions > Ideas](https://github.com/jonckr/cite-verify/discussions/categories/ideas) first.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do that cite-verify doesn't support yet?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other tools you've looked at.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: How big is this change?
      options:
        - Small — tweak to existing behavior
        - Medium — new flag or mode
        - Large — new lookup source or parser
